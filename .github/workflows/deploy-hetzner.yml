name: Deploy Hetzner

on:
  workflow_run:
    workflows:
      - Build Images
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or commit SHA to deploy
        required: false
        type: string

concurrency:
  group: deploy-hetzner-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Resolve deploy ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.ref }}" ]; then
            echo "value=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_APP_SSH_KEY }}

      - name: Add Hetzner host key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_APP_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on app host
        env:
          DEPLOY_REF: ${{ steps.ref.outputs.value }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          HETZNER_APP_HOST: ${{ secrets.HETZNER_APP_HOST }}
          HETZNER_APP_PATH: ${{ secrets.HETZNER_APP_PATH }}
          HETZNER_APP_USER: ${{ secrets.HETZNER_APP_USER }}
        run: |
          ssh "${HETZNER_APP_USER}@${HETZNER_APP_HOST}" \
            "export DEPLOY_REF='${DEPLOY_REF}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' APP_PATH='${HETZNER_APP_PATH}'; bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_PATH"

          if [ ! -d .git ]; then
            echo "Deployment path does not contain a git checkout: $APP_PATH" >&2
            exit 1
          fi

          if [ ! -f .env ]; then
            echo "Missing .env in deployment path: $APP_PATH/.env" >&2
            exit 1
          fi

          git fetch --tags --prune origin
          git checkout "$DEPLOY_REF"

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose -f infra/docker-compose.prod.yml pull
          docker compose --profile ops -f infra/docker-compose.prod.yml run --rm migrate
          docker compose -f infra/docker-compose.prod.yml up -d --remove-orphans
          docker compose -f infra/docker-compose.prod.yml ps
          EOF
